<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hire Mobi Deck | Professional Process</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                mobi: {
                  1: '#565F80',
                  2: '#636396',
                  3: '#9B679C',
                  4: '#CC7696',
                  5: '#EB7F8F',
                }
              },
              fontFamily: {
                sans: ['Plus Jakarta Sans', 'sans-serif'],
              }
            }
          }
        }
    </script>
    <style>
        body { scroll-behavior: smooth; margin: 0; }
        .hero-gradient { background: linear-gradient(135deg, #565F80 0%, #636396 50%, #9B679C 100%); }
        .glass-nav { background: rgba(86, 95, 128, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .parallax-container {
            position: relative;
            height: 90vh;
            overflow: hidden;
            clip-path: inset(0 0 0 0);
        }

        .fixed-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: -1;
            transform: translateZ(0);
        }

        .content-overlay {
            position: relative;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            z-index: 10;
        }

        .step-card {
            background: rgba(255, 255, 255, 0.98);
            border-left: 6px solid #EB7F8F;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .hero-logo-bg {
            position: absolute;
            right: -5%;
            top: 50%;
            transform: translateY(-50%);
            width: 60%;
            opacity: 0.1;
            z-index: 1;
            pointer-events: none;
            filter: brightness(0) invert(1);
        }

        #mobile-menu { display: none; opacity: 0; transition: all 0.3s ease; }
        #mobile-menu.active { display: flex; opacity: 1; }
    </style>
</head>
<body class="bg-stone-50 text-mobi-1">

<header class="fixed w-full z-[100] glass-nav">
    <nav class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center text-white">
        
        <!-- UPDATED: clickable logo -->
        <a href="index.html" class="flex items-center gap-4">
            <img src="https://mobi.help/logo_cropped_F.png" alt="Mobi Deck Logo" class="h-12 w-auto">
            <h1 class="text-xl font-extrabold tracking-tighter uppercase">Mobi Deck</h1>
        </a>

        <div class="hidden md:flex items-center space-x-10 text-[11px] font-bold uppercase tracking-[0.2em]">
            <a href="#step1" class="hover:text-mobi-5 transition">01. Quotation</a>
            <a href="#step2" class="hover:text-mobi-5 transition">02. Payment</a>
            <a href="#step3" class="hover:text-mobi-5 transition">03. Installation</a>
            <a href="#contact" class="px-6 py-2.5 rounded-full bg-mobi-5 text-white hover:bg-white hover:text-mobi-1 transition duration-300">Contact Us</a>
        </div>

        <button id="menu-toggle" class="md:hidden text-white focus:outline-none">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
            </svg>
        </button>
    </nav>

    <div id="mobile-menu" class="fixed inset-x-0 top-[72px] bg-mobi-1 text-white p-8 flex flex-col space-y-6 text-center font-bold uppercase tracking-widest shadow-2xl z-[90]">
        <a href="#step1" class="mobile-link">01. Quotation</a>
        <a href="#step2" class="mobile-link">02. Payment</a>
        <a href="#step3" class="mobile-link">03. Installation</a>
        <a href="#contact" class="mobile-link text-mobi-5">Contact Us</a>
    </div>
</header>

<!-- rest of your file stays EXACTLY the same -->

<script>
    const menuToggle = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');

    menuToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        mobileMenu.classList.toggle('active');
    });

    document.querySelectorAll('.mobile-link').forEach(link => {
        link.addEventListener('click', () => mobileMenu.classList.remove('active'));
    });

    document.addEventListener('click', (e) => {
        if (!mobileMenu.contains(e.target) && !menuToggle.contains(e.target)) {
            mobileMenu.classList.remove('active');
        }
    });
</script>

</body>
</html>
