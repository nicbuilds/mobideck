<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimizador Mobi Deck Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row border border-gray-200">
        
        <div class="p-8 md:w-3/5">
            <div class="flex items-center gap-3 mb-8">
                <div class="bg-amber-500 p-2 rounded-lg text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-7h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                </div>
                <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">Mobi Deck Pro <span class="text-amber-600">Optimizador</span></h2>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-500 uppercase tracking-wider mb-3">Madera de Especialidad</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="setMadera('maculi', 1200)" id="btn-maculi" class="madera-btn p-4 border-2 border-amber-500 bg-amber-50 rounded-xl text-left transition-all">
                            <span class="block font-bold text-slate-800">Maculí</span>
                            <span class="text-xs text-slate-500">$1,200 / m²</span>
                        </button>
                        <button onclick="setMadera('parota', 1500)" id="btn-parota" class="madera-btn p-4 border-2 border-gray-100 rounded-xl text-left hover:border-amber-200 transition-all">
                            <span class="block font-bold text-slate-800">Parota</span>
                            <span class="text-xs text-slate-500">$1,500 / m²</span>
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-500 mb-2">Largo (Metros)</label>
                        <input type="number" id="largo" value="1" min="1" oninput="calcular()" 
                            class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none font-bold text-slate-700">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-500 mb-2">Ancho (Metros)</label>
                        <input type="number" id="ancho" value="1" min="1" oninput="calcular()" 
                            class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none font-bold text-slate-700">
                    </div>
                </div>
            </div>
        </div>

        <div class="p-8 md:w-2/5 bg-slate-900 text-white flex flex-col justify-between">
            <div>
                <h3 class="text-lg font-bold mb-6 text-amber-400">Cotización Final</h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-400">Superficie útil:</span>
                        <span id="res-area" class="font-semibold text-lg">1.00 m²</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-400">Margen desperdicio (10%):</span>
                        <span id="res-desperdicio" class="font-semibold text-slate-300">0.10 m²</span>
                    </div>
                    <div class="pt-4 border-t border-slate-700">
                        <p class="text-slate-400 text-sm mb-1">Total a pagar:</p>
                        <p id="res-total" class="text-4xl font-black text-white">$1,320.00</p>
                    </div>
                </div>
            </div>

            <div class="mt-8">
                <button class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-blue-900/20 flex items-center justify-center gap-2 group">
                    <span>Ir a Mercado Pago</span>
                    <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                </button>
                <p class="text-[10px] text-center text-slate-500 mt-4 uppercase tracking-widest">Seguridad cifrada por Mercado Pago</p>
            </div>
        </div>
    </div>

    <script>
        let precioM2 = 1200; // Por defecto Maculí
        const factorDesperdicio = 1.10;

        function setMadera(tipo, precio) {
            precioM2 = precio;
            
            // Actualizar UI de botones
            document.querySelectorAll('.madera-btn').forEach(btn => {
                btn.classList.remove('border-amber-500', 'bg-amber-50');
                btn.classList.add('border-gray-100');
            });
            
            const btnActivo = document.getElementById(`btn-${tipo}`);
            btnActivo.classList.remove('border-gray-100');
            btnActivo.classList.add('border-amber-500', 'bg-amber-50');
            
            calcular();
        }

        function calcular() {
            const largo = parseFloat(document.getElementById('largo').value) || 0;
            const ancho = parseFloat(document.getElementById('ancho').value) || 0;
            
            const areaBase = largo * ancho;
            const areaConDesperdicio = areaBase * factorDesperdicio;
            const desperdicioM2 = areaConDesperdicio - areaBase;
            const total = areaConDesperdicio * precioM2;

            // Formatear resultados
            document.getElementById('res-area').innerText = `${areaBase.toFixed(2)} m²`;
            document.getElementById('res-desperdicio').innerText = `${desperdicioM2.toFixed(2)} m²`;
            document.getElementById('res-total').innerText = new Intl.NumberFormat('es-MX', {
                style: 'currency',
                currency: 'MXN'
            }).format(total);
        }
    </script>
</body>
</html>
